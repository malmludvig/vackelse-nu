name: Search Agent

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: agent
        run: npm install

      - name: Run agent
        working-directory: agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node run.js

      - name: Commit results
        run: |
          git config user.name "malmludvig"
          git config user.email "malmludvig@gmail.com"
          git add data/results.json data/history.json
          git diff --staged --quiet || git commit -m "chore: update search results [skip ci]"
          git push
